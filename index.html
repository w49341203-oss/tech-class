    <script>
        // Fix D: 強化錯誤紀錄 — 含 column 與 stack，並攔截未捕捉的 Promise rejection
        function _logErr(label, msg, line, col, stack) {
            var el = document.getElementById('error-log');
            el.style.display='block';
            var errLine = document.createElement('div');
            errLine.textContent = label + ': ' + msg + ' (L' + (line||'?') + ':' + (col||'?') + ')' + (stack ? '\n' + stack : '');
            errLine.style.whiteSpace = 'pre-wrap';
            errLine.style.borderBottom = '1px solid #fcc';
            errLine.style.marginBottom = '4px';
            el.appendChild(errLine);
        }
        window.onerror = function(msg, src, line, col, err) {
            _logErr('Err', msg, line, col, err && err.stack);
        };
        window.addEventListener('unhandledrejection', function(e) {
            var r = e.reason;
            _logErr('Unhandled Promise', (r && r.message) ? r.message : String(r), null, null, r && r.stack);
        });
    </script>

        const isVatRevenue = (t) => t.amount > 0 && /^(政府採購|同業訂單出貨|報價成交出貨)/.test(t.desc || "");

        const computeCompanyVatPreview = (c) => {
            const tx = c.transactions || [];
            const totalSales = tx.filter(isVatRevenue).reduce((s, t) => s + t.amount, 0);
            const already = c.vatBaseSettled || 0;
            const taxableBase = Math.max(0, totalSales - already);
            const tax = Math.round(taxableBase * VAT_RATE);
            return { totalSales, already, taxableBase, tax, newBase: Math.max(totalSales, already) };
        };

        const computeCompanyIncomeTaxPreview = (c) => {
            const tx = c.transactions || [];
            const revenue = tx.filter(isVatRevenue).reduce((s, t) => s + t.amount, 0);
            const expense = tx.filter(isBusinessExpense).reduce((s, t) => s + Math.abs(t.amount), 0);
            const profit = revenue - expense;
            const tax = profit > 0 ? Math.round(profit * INCOME_TAX_RATE) : 0;
            return { revenue, expense, profit, tax };

        const getAggregatedInventory = (inventory) => {
            const agg = {};
            inventory.forEach(item => {
                if (!agg[item.name]) {
                    agg[item.name] = { name: item.name, quantity: 0, totalCost: 0, count: 0, sources: new Set() };
                }
                agg[item.name].quantity += item.quantity;
                agg[item.name].totalCost += (item.cost * item.quantity);
                agg[item.name].count += item.quantity;
                if (item.source) agg[item.name].sources.add(item.source);
            });
            return Object.values(agg).map(i => ({
                name: i.name,
                quantity: i.quantity,
                avgCost: i.count > 0 ? i.totalCost / i.count : 0,
                source: Array.from(i.sources).join(', ') || '未知'

        const deductInventory = (inventory, itemName, qty) => {
            if (!qty || qty <= 0) throw new Error(`數量必須為正整數 (收到: ${qty})`);
            let newInv = JSON.parse(JSON.stringify(inventory));
            let remaining = qty;
            const total = newInv.filter(i => i.name === itemName).reduce((sum, i) => sum + i.quantity, 0);
            if (total < qty) throw new Error(`庫存不足: ${itemName} (剩餘: ${total}, 需求: ${qty})`);
            for (let i = 0; i < newInv.length; i++) {
                if (newInv[i].name === itemName) {
                    const take = Math.min(newInv[i].quantity, remaining);
                    newInv[i].quantity -= take;
                    remaining -= take;
                    if (remaining <= 0) break;
                }
            }
            return newInv.filter(i => i.quantity > 0);

                <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto bg-white border rounded">
                    <text x={pad.l} y="14" fontSize="11" fill="#334155">{label}</text>
                    <line x1={pad.l} y1={pad.t} x2={pad.l} y2={pad.t + h} stroke="#cbd5e1" />
                    <line x1={pad.l} y1={pad.t + h} x2={pad.l + w} y2={pad.t + h} stroke="#cbd5e1" />
                    <text x="5" y={pad.t + 4} fontSize="9" fill="#64748b">{maxV.toLocaleString()}</text>
                    {data.map((d, i) => {
                        const bh = (d.value / maxV) * h;
                        const bx = pad.l + gap / 2 + i * (bw + gap);
                        const by = pad.t + h - bh;
                        return (<g key={i}>
                            <rect x={bx} y={by} width={bw} height={bh} fill={d.color || color} />
                            <text x={bx + bw / 2} y={by - 2} fontSize="8" fill="#334155" textAnchor="middle">{d.value.toLocaleString()}</text>
                            <text x={bx + bw / 2} y={pad.t + h + 12} fontSize="8" fill="#64748b" textAnchor="middle">{d.label}</text>
                        </g>);
                    })}
                </svg>
            );
        };

        const Button = ({children, onClick, color, className, disabled}) => {
            const [processing, setProcessing] = useState(false);
            const c = {blue:"bg-blue-600 hover:bg-blue-700 text-white", red:"bg-red-600 hover:bg-red-700 text-white", green:"bg-emerald-600 hover:bg-emerald-700 text-white", gray:"bg-slate-100 hover:bg-slate-200 text-slate-700", yellow:"bg-amber-500 hover:bg-amber-600 text-white", purple:"bg-purple-600 hover:bg-purple-700 text-white"};
            const handleClick = async () => { if(processing || disabled) return; setProcessing(true); try { await onClick(); } catch(e) { console.error(e); alert("錯誤: " + e.message); } finally { setProcessing(false); } };
            return <button onClick={handleClick} disabled={disabled || processing} className={`cursor-pointer px-4 py-2 rounded-lg font-bold transition-all disabled:opacity-50 disabled:cursor-not-allowed ${c[color||'blue']} ${className||''}`}>{processing ? '⏳...' : children}</button>
        };

        const Card = ({children, className}) => <div className={`bg-white p-5 rounded-xl shadow-sm border border-slate-200 ${className}`}>{children}</div>;

        // 全螢幕切換按鈕 — 任何頁面右上角共用
        const FullscreenToggle = () => {
            const [isFs, setIsFs] = useState(!!(document.fullscreenElement || document.webkitFullscreenElement));
            useEffect(() => {
                const handler = () => setIsFs(!!(document.fullscreenElement || document.webkitFullscreenElement));
                document.addEventListener('fullscreenchange', handler);
                document.addEventListener('webkitfullscreenchange', handler);
                return () => {
                    document.removeEventListener('fullscreenchange', handler);
                    document.removeEventListener('webkitfullscreenchange', handler);
                };
            }, []);
            return <Button color="gray" className="text-xs px-2 py-1" onClick={toggleFullscreen}>{isFs ? '🗗 視窗' : '⛶ 全螢幕'}</Button>;
        };
        const ConfirmModal = ({ title, message, onConfirm, onCancel }) => (<div className="custom-modal-overlay"><div className="custom-modal text-center"><h3 className="text-xl font-bold text-red-600 mb-2">{title}</h3><p className="text-gray-600 mb-6 whitespace-pre-line">{message}</p><div className="flex gap-4 justify-center"><button onClick={onCancel} className="cursor-pointer px-4 py-2 bg-gray-200 rounded-lg text-gray-700 font-bold hover:bg-gray-300">取消</button><button onClick={onConfirm} className="cursor-pointer px-4 py-2 bg-red-600 rounded-lg text-white font-bold hover:bg-red-700">確認執行</button></div></div></div>);
        const PwdModal = ({ onClose, onSubmit }) => { const [p, setP] = useState(""); return <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50"><div className="bg-white p-6 rounded-xl w-80 shadow-2xl"><h3 className="font-bold mb-4 text-lg">修改密碼</h3><input className="w-full p-2 border rounded mb-4" placeholder="新密碼" value={p} onChange={e=>setP(e.target.value)} /><div className="flex justify-end gap-2"><Button color="gray" onClick={onClose}>取消</Button><Button onClick={()=>onSubmit(p)}>確認</Button></div></div></div>; };
        const NewsModal = ({ onClose, onSubmit }) => { const [txt, setTxt] = useState(""); return <div className="custom-modal-overlay"><div className="custom-modal text-center"><h3 className="font-bold text-lg mb-4 text-purple-800">發布市場快訊</h3><textarea className="w-full p-2 border rounded mb-4" rows="3" placeholder="輸入新聞內容..." value={txt} onChange={e=>setTxt(e.target.value)}></textarea><div className="flex justify-end gap-2"><Button color="gray" onClick={onClose}>取消</Button><Button color="purple" onClick={()=>onSubmit(txt)}>發布</Button></div></div></div>; };

        const AmountInputModal = ({ title, defaultVal, color, onClose, onSubmit }) => {
            const [v, setV] = useState(defaultVal || "");
            return <div className="custom-modal-overlay"><div className="custom-modal text-center">
                <h3 className={`font-bold text-lg mb-4 ${color === 'red' ? 'text-red-700' : 'text-emerald-700'}`}>{title}</h3>
                <input type="number" min="1" step="1" onKeyDown={blockNonInt} className="w-full p-2 border rounded mb-4" placeholder="輸入金額" value={v} onChange={e => setV(e.target.value)} />
                <div className="flex justify-end gap-2"><Button color="gray" onClick={onClose}>取消</Button><Button color={color || "blue"} onClick={() => { if (Number(v) > 0) onSubmit(Number(v)); }}>確認</Button></div>
            </div></div>;
        };

        const OrphanageModal = ({ studentName, children, onClose }) => (
            <div className="custom-modal-overlay">
                <div className="custom-modal text-center" style={{maxWidth: 500}}>
                    <div className="text-6xl mb-2">😢👨‍👩‍👧‍👦</div>
                    <h3 className="text-xl font-bold text-red-700 mb-2">家庭破碎</h3>
                    <p className="text-sm text-slate-700 mb-3"><b>{studentName}</b> 宣告個人破產，無力撫養 {children} 名小孩...</p>
                    <div className="bg-red-50 p-3 rounded border border-red-200 text-sm text-red-800 mb-4">
                        <p>🏚️ 小孩們哭著被送往孤兒院</p>
                        <p>「爸爸/媽媽，不要丟下我們...」</p>
                    </div>
                    <Button color="gray" onClick={onClose}>關閉</Button>
                </div>
            </div>
        );

        const HousingModal = ({ user, onClose, onConfirm }) => {
            const currentOpt = HOUSING_OPTIONS[user.housing || "none"];
            const isBought = currentOpt.type === 'buy';
            const [sel, setSel] = useState(user.housing || "none");
            const opt = HOUSING_OPTIONS[sel];
            const canAfford = opt.type !== 'buy' || (user.personalBalance || 0) >= opt.down;
            const sameAsCurrent = sel === (user.housing || "none");
            return <div className="custom-modal-overlay"><div className="custom-modal-lg">
                <h3 className="font-bold text-lg mb-3 text-blue-800">🏠 選擇住屋</h3>
                <p className="text-xs text-slate-500 mb-1">目前個人存款：${(user.personalBalance || 0).toLocaleString()}</p>
                <p className="text-xs text-slate-500 mb-3">目前住屋：<b>{currentOpt.label}</b></p>
                {isBought && <div className="bg-amber-50 border border-amber-300 text-amber-800 text-xs p-2 rounded mb-3">⚠️ 您已購屋，房子無法輕易脫手，目前無法變更住屋選擇。</div>}
                <div className="space-y-2 mb-4">
                    {Object.values(HOUSING_OPTIONS).map(o => (
                        <label key={o.key} className={`flex items-center gap-2 p-2 border rounded ${isBought ? 'cursor-not-allowed opacity-50' : 'cursor-pointer'} ${sel === o.key ? 'bg-blue-50 border-blue-400' : 'hover:bg-slate-50'}`}>
                            <input type="radio" name="housing" disabled={isBought} checked={sel === o.key} onChange={() => setSel(o.key)} />
                            <div className="flex-1 text-sm">
                                <div className="font-bold">{o.label}</div>
                                <div className="text-xs text-slate-500">
                                    {o.type === 'rent' && `每月房租 $${o.monthly.toLocaleString()}`}
                                    {o.type === 'buy' && `頭期款 $${o.down.toLocaleString()}，每月房貸 $${o.monthly.toLocaleString()}`}
                                    {o.type === 'free' && `不需付房屋費用`}
                                </div>
                            </div>
                        </label>
                    ))}
                </div>
                {!canAfford && !isBought && <p className="text-xs text-red-600 mb-2">⚠️ 存款不足以支付頭期款</p>}
                {opt.type === 'buy' && !isBought && !sameAsCurrent && <p className="text-xs text-amber-700 mb-2">⚠️ 注意：購屋後將無法再變更住屋選擇</p>}
                <div className="flex justify-end gap-2">
                    <Button color="gray" onClick={onClose}>取消</Button>
                    <Button color="blue" disabled={!canAfford || isBought || sameAsCurrent} onClick={() => onConfirm(sel)}>確認</Button>
                </div>
            </div></div>;
        };

        const FamilyModal = ({ user, onClose, onConfirm }) => {
            const locked = !!user.familyConfirmed;
            const [fam, setFam] = useState(user.family || "single");
            const [kids, setKids] = useState(user.children || 0);
            const minKids = user.children || 0;
            return <div className="custom-modal-overlay"><div className="custom-modal">
                <h3 className="font-bold text-lg mb-3 text-pink-700">👨‍👩‍👧 家庭狀況</h3>
                <p className="text-xs text-slate-500 mb-3">⚠️ 小孩數量按確認後不可減少（上限 {MAX_CHILDREN} 名）。{locked && " 您已確認過家庭狀況，只能增加小孩。"}</p>
                <div className="space-y-2 mb-3">
                    <label className="flex items-center gap-2"><input type="radio" disabled={locked && user.family === 'married' && (user.children || 0) > 0} checked={fam === 'single'} onChange={() => { setFam('single'); setKids(0); }} /> 單身 (基礎生活費 ${BASE_LIVING_SINGLE.toLocaleString()})</label>
                    <label className="flex items-center gap-2"><input type="radio" checked={fam === 'married'} onChange={() => setFam('married')} /> 已婚 (基礎生活費 ${BASE_LIVING_MARRIED.toLocaleString()} + ${CHILD_COST.toLocaleString()}*小孩數)</label>
                </div>
                {fam === 'married' && (
                    <div className="bg-pink-50 p-2 rounded mb-3 border border-pink-100">
                        <label className="text-sm">小孩數量：</label>
                        <select value={kids} onChange={e => setKids(Number(e.target.value))} className="w-20 p-1 border rounded ml-2">
                            {Array.from({length: MAX_CHILDREN - minKids + 1}, (_, i) => minKids + i).map(n => (
                                <option key={n} value={n}>{n}</option>
                            ))}
                        </select>
                        <span className="text-xs text-slate-400 ml-1">（0 ~ {MAX_CHILDREN}，整數）</span>
                        <div className="text-xs text-slate-500 mt-1">每月生活費試算：${(BASE_LIVING_MARRIED + CHILD_COST * kids).toLocaleString()}</div>
                    </div>
                )}
                <div className="flex justify-end gap-2"><Button color="gray" onClick={onClose}>取消</Button><Button color="purple" onClick={() => onConfirm({ family: fam, children: fam === 'single' ? 0 : kids })}>確認</Button></div>
            </div></div>;
        };

        const ResetPwdModal = ({ users, onClose, onSubmit }) => {
            const [uid, setUid] = useState("");
            const [pwd, setPwd] = useState("");
            return <div className="custom-modal-overlay"><div className="custom-modal">
                <h3 className="font-bold text-lg mb-3 text-amber-700">🔑 重置學生密碼</h3>
                <select className="w-full p-2 border rounded mb-2" value={uid} onChange={e => setUid(e.target.value)}>
                    <option value="">選擇學生...</option>
                    {users.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
                </select>
                <input className="w-full p-2 border rounded mb-3" placeholder="新密碼" value={pwd} onChange={e => setPwd(e.target.value)} />
                <div className="flex justify-end gap-2"><Button color="gray" onClick={onClose}>取消</Button><Button color="yellow" onClick={() => { if (uid && pwd) onSubmit(uid, pwd); }}>重置</Button></div>
            </div></div>;
        };

        const NewsBanner = ({ text, onTeacherDismiss }) => {
            const [visible, setVisible] = useState(true);
            const [busy, setBusy] = useState(false);
            useEffect(() => { if (text) setVisible(true); }, [text]);
            if (!text || !visible) return null;
            const handleClose = async () => {
                if (busy) return;
                if (onTeacherDismiss) {
                    setBusy(true);
                    try { await onTeacherDismiss(); } catch(e) { console.error(e); }
                    setBusy(false);
                } else {
                    setVisible(false);
                }
            };
            return (
                <div className="news-ticker">
                    <div className="flex-1 text-center">📢 快訊：{text}</div>
                    <button onClick={handleClose} disabled={busy} className="ml-4 text-white hover:bg-red-800 rounded px-2 cursor-pointer disabled:opacity-50" title={onTeacherDismiss ? "結束此則快訊（全班同步消失）" : "在我的畫面隱藏"}>✕</button>
                </div>
            );
        };

        const FinancialReportModal = ({ transactions, capital, onClose }) => {
            const stats = useMemo(() => {
                let income = 0, expense = 0;
                transactions.forEach(t => { if (t.amount > 0) income += t.amount; else expense += Math.abs(t.amount); });
                return { income, expense, profit: income - expense };
            }, [transactions]);
            return (
                <div className="custom-modal-overlay"><div className="custom-modal-lg">
                    <div className="flex justify-between items-center mb-4 border-b pb-2"><h3 className="text-xl font-bold text-emerald-800">📊 財務報表</h3><button onClick={onClose} className="cursor-pointer text-gray-500 hover:text-gray-800">✕</button></div>
                    <div className="grid grid-cols-3 gap-4 mb-6">
                        <div className="bg-emerald-50 p-3 rounded border border-emerald-100 text-center"><div className="text-sm text-emerald-600 font-bold mb-1">總收入 (Income)</div><div className="text-xl font-bold text-emerald-700">${stats.income.toLocaleString()}</div></div>
                        <div className="bg-red-50 p-3 rounded border border-red-100 text-center"><div className="text-sm text-red-600 font-bold mb-1">總支出 (Expense)</div><div className="text-xl font-bold text-red-700">${stats.expense.toLocaleString()}</div></div>
                        <div className="bg-blue-50 p-3 rounded border border-blue-100 text-center"><div className="text-sm text-blue-600 font-bold mb-1">淨利 (Net Profit)</div><div className={`text-xl font-bold ${stats.profit >= 0 ? 'text-blue-700' : 'text-red-600'}`}>${stats.profit.toLocaleString()}</div></div>
                    </div>
                    <h4 className="font-bold text-sm text-slate-700 mb-2">近期交易明細</h4>
                    <div className="overflow-x-auto"><table className="report-table"><thead><tr><th>時間</th><th>摘要</th><th>經手人</th><th>金額</th></tr></thead><tbody>{transactions.length === 0 ? (<tr><td colSpan="4" className="text-center text-gray-400">尚無交易紀錄</td></tr>) : (transactions.map((t, idx) => (<tr key={idx}><td>{t.time}</td><td>{t.desc}</td><td>{t.user}</td><td className={t.amount >= 0 ? "text-income" : "text-expense"}>{t.amount > 0 ? "+" : ""}{t.amount.toLocaleString()}</td></tr>)))}</tbody></table></div>
                    <div className="mt-4 pt-2 border-t text-right text-xs text-gray-500">目前資產總額: ${capital.toLocaleString()}</div>
                </div></div>
            );
        };

        const ResumeModal = ({ user, comps, onClose }) => {
            const jobs = user.jobHistory || [];
            return <div className="custom-modal-overlay"><div className="custom-modal-lg">
                <div className="flex justify-between items-center mb-3 border-b pb-2"><h3 className="text-xl font-bold text-indigo-800">📄 個人履歷表 — {user.name}</h3><button onClick={onClose} className="cursor-pointer text-gray-500">✕</button></div>
                <div className="grid grid-cols-2 gap-3 mb-3 text-sm">
                    <div className="bg-slate-50 p-2 rounded"><b>家庭狀況：</b>{user.family === 'married' ? `已婚 (${user.children || 0} 名小孩)` : '單身'}</div>
                    <div className="bg-slate-50 p-2 rounded"><b>住屋：</b>{HOUSING_OPTIONS[user.housing || "none"].label}</div>
                    <div className="bg-slate-50 p-2 rounded"><b>個人存款：</b>${(user.personalBalance || 0).toLocaleString()}</div>
                    <div className="bg-slate-50 p-2 rounded"><b>累計營業利潤：</b>${(user.cumulativeProfit || 0).toLocaleString()}</div>
                </div>
                <h4 className="font-bold text-sm text-slate-700 mb-2">工作經歷</h4>
                <table className="report-table mb-2"><thead><tr><th>公司</th><th>職務</th><th>月薪</th><th>到職</th><th>離職</th><th>表現備註</th></tr></thead><tbody>
                    {user.companyId && (<tr><td>{comps[user.companyId]?.name || '-'}</td><td>{user.role}</td><td>${(user.salary || 0).toLocaleString()}</td><td>{user.currentJoinDate || '-'}</td><td className="text-emerald-600">在職中</td><td>-</td></tr>)}
                    {jobs.length === 0 && !user.companyId && <tr><td colSpan="6" className="text-center text-gray-400">尚無工作紀錄</td></tr>}
                    {jobs.slice().reverse().map((j, i) => (<tr key={i}><td>{j.compName}</td><td>{j.role}</td><td>${(j.salary || 0).toLocaleString()}</td><td>{j.joinDate}</td><td>{j.leaveDate || '-'}</td><td>{j.note || '-'}</td></tr>))}
                </tbody></table>
            </div></div>;
        };

        const StudentHistoryModal = ({ users, comps, onClose }) => {
            const [sortKey, setSortKey] = useState("name");
            const sorted = [...users].sort((a, b) => {
                if (sortKey === 'balance') return (b.personalBalance || 0) - (a.personalBalance || 0);
                if (sortKey === 'salary') return (b.salary || 0) - (a.salary || 0);
                return (a.name || "").localeCompare(b.name || "");
            });
            return <div className="custom-modal-overlay"><div className="custom-modal-lg" style={{maxWidth: 900}}>
                <div className="flex justify-between items-center mb-3 border-b pb-2"><h3 className="text-xl font-bold text-indigo-800">📋 學生歷程記錄</h3><button onClick={onClose} className="cursor-pointer text-gray-500">✕</button></div>
                <div className="mb-2 flex gap-2 text-xs"><span>排序：</span>
                    <button onClick={() => setSortKey('name')} className={`cursor-pointer px-2 py-1 rounded ${sortKey === 'name' ? 'bg-indigo-600 text-white' : 'bg-slate-200'}`}>姓名</button>
                    <button onClick={() => setSortKey('balance')} className={`cursor-pointer px-2 py-1 rounded ${sortKey === 'balance' ? 'bg-indigo-600 text-white' : 'bg-slate-200'}`}>存款</button>
                    <button onClick={() => setSortKey('salary')} className={`cursor-pointer px-2 py-1 rounded ${sortKey === 'salary' ? 'bg-indigo-600 text-white' : 'bg-slate-200'}`}>薪資</button>
                </div>
                <div className="overflow-x-auto">
                <table className="report-table text-xs"><thead><tr>
                    <th>姓名</th><th>公司</th><th>職務</th><th>月薪</th><th>存款</th><th>住屋</th><th>每月房</th><th>家庭</th><th>小孩</th><th>每月生活費</th><th>連續欠繳</th><th>狀態</th>
                </tr></thead><tbody>
                    {sorted.map(u => {
                        const housing = HOUSING_OPTIONS[u.housing || "none"];
                        const monthlyLiving = computeTotalLivingCost(u);
                        const cannotAfford = (u.personalBalance || 0) < monthlyLiving;
                        const isBank = u.isBankrupt;
                        const cls = isBank ? 'bg-red-100' : (cannotAfford ? 'bg-amber-50' : '');
                        return (<tr key={u.id} className={cls}>
                            <td className="font-bold">{u.name}</td>
                            <td>{u.companyId ? (comps[u.companyId]?.name || '-') : '無業'}</td>
                            <td>{u.role || '-'}</td>
                            <td>${(u.salary || 0).toLocaleString()}</td>
                            <td className={cannotAfford ? 'text-red-700 font-bold' : ''}>${(u.personalBalance || 0).toLocaleString()}{cannotAfford && ' ⚠️'}</td>
                            <td>{housing.label}</td>
                            <td>${housing.monthly.toLocaleString()}</td>
                            <td>{u.family === 'married' ? '已婚' : '單身'}</td>
                            <td>{u.children || 0}</td>
                            <td>${monthlyLiving.toLocaleString()}</td>
                            <td className={(u.missedLivingCost || 0) >= 1 ? 'text-red-600 font-bold' : ''}>{u.missedLivingCost || 0} 次</td>
                            <td>{isBank ? <span className="text-red-700 font-bold">💀 已破產</span> : (cannotAfford ? <span className="text-amber-700 font-bold">⚠️ 付不出</span> : '正常')}</td>
                        </tr>);
                    })}
                </tbody></table>
                </div>
            </div></div>;
        };

        const computeSettlement = (users, comps) => {
            const compArr = Object.values(comps);
            const topEnterprises = compArr.filter(c => (c.capital || 0) >= 10000000).map(c => c.name);
            const happyEnterprises = compArr.filter(c => (c.employees || []).length > 0 && (c.employees || []).every(e => (e.salary || 0) >= 50000)).map(c => c.name);
            const topSalesUser = users.filter(u => u.role === '業務經理').sort((a, b) => (b.cumulativeProfit || 0) - (a.cumulativeProfit || 0))[0];
            const compsByPerCapita = compArr.map(c => {
                const emps = c.employees || [];
                const revenue = (c.transactions || []).filter(t => t.amount > 0 && !/貸款/.test(t.desc || "")).reduce((s, t) => s + t.amount, 0);
                return { c, perCapita: emps.length > 0 ? revenue / emps.length : 0, ceo: emps.find(e => e.role === 'CEO') };
            }).sort((a, b) => b.perCapita - a.perCapita);
            const bestCEO = compsByPerCapita.find(x => x.ceo);
            const compsByCapital = [...compArr].sort((a, b) => (b.capital || 0) - (a.capital || 0));
            const richest = compsByCapital[0];
            const bestCFO = richest ? (richest.employees || []).find(e => e.role === '財務長') : null;
            const noFineComps = compArr.filter(c => !(c.transactions || []).some(t => /罰款/.test(t.desc || "")));
            const noFineHRs = noFineComps.flatMap(c => (c.employees || []).filter(e => e.role === '人資經理').map(e => ({ ...e, compName: c.name })));
            const compsByTechAndOutput = compArr.map(c => {
                const tech = c.techLevel || 1;
                const recipes = RECIPES[c.id] || {};
                const topProduct = recipes[tech]?.name;
                let topOutput = 0;
                if (topProduct) {
                    // 只 sum「生產(成本): {topProduct} x{n}」格式中精確匹配 topProduct 的數量
                    (c.transactions || []).forEach(t => {
                        const m = (t.desc || "").match(/^生產(?:成本)?:\s*(.+?)\s*x(\d+)/);
                        if (m && m[1] === topProduct) topOutput += Number(m[2]);
                    });
                }
                return { c, tech, topProduct, topOutput, rnd: (c.employees || []).find(e => e.role === '研發經理') };
            });
            const maxTech = Math.max(...compsByTechAndOutput.map(x => x.tech), 1);
            const bestRnD = compsByTechAndOutput.filter(x => x.tech === maxTech && !x.c.type.includes('下游')).sort((a, b) => b.topOutput - a.topOutput)[0];
            const downstream = compArr.filter(c => c.type.includes('下游'));
            const proc = downstream.map(c => {
                // 真正的「平均單價」：sum(總成本) / sum(總數量)
                // 下游進貨有兩種 desc：「採購到貨: ...」與「報價: ... (採購核准)」
                let totalCost = 0, totalQty = 0;
                (c.transactions || []).forEach(t => {
                    if (t.amount < 0 && /^(採購|報價)/.test(t.desc || "")) {
                        const m = (t.desc || "").match(/x(\d+)/);
                        if (m) { totalCost += Math.abs(t.amount); totalQty += Number(m[1]); }
                    }
                });
                const avgCost = totalQty > 0 ? totalCost / totalQty : Infinity;
                return { c, avgCost, proc: (c.employees || []).find(e => e.role === '採購經理') };
            }).filter(x => x.avgCost !== Infinity && x.proc).sort((a, b) => a.avgCost - b.avgCost);
            const bestProc = proc[0];
            return { topEnterprises, happyEnterprises, topSalesUser, bestCEO, bestCFO, richest, noFineHRs, bestRnD, bestProc };
        };

        const SettlementModal = ({ users, comps, onClose }) => {

                <Award title="😊 幸福企業 (全員薪資 ≥ 5萬)" color="bg-pink-50 border-pink-500" content={s.happyEnterprises.length ? s.happyEnterprises.join('、') : '無'} />
                <Award title="🥇 Top Sales (累計利潤最高之業務經理)" color="bg-blue-50 border-blue-500" content={s.topSalesUser ? `${s.topSalesUser.name} (累計利潤 $${(s.topSalesUser.cumulativeProfit || 0).toLocaleString()})` : '無'} />
                <Award title="👔 傑出 CEO (人均產值最高公司之 CEO)" color="bg-red-50 border-red-500" content={s.bestCEO?.ceo ? `${s.bestCEO.ceo.name} (${s.bestCEO.c.name}，人均產值 $${Math.round(s.bestCEO.perCapita).toLocaleString()})` : '無'} />
                <Award title="💰 傑出財務長 (資本額最高公司之 CFO)" color="bg-emerald-50 border-emerald-500" content={s.bestCFO ? `${s.bestCFO.name} (${s.richest.name}，資本額 $${(s.richest.capital || 0).toLocaleString()})` : '無'} />
                <Award title="🧡 傑出人資長 (無罰款公司之人資)" color="bg-orange-50 border-orange-500" content={s.noFineHRs.length ? s.noFineHRs.map(h => `${h.name} (${h.compName})`).join('、') : '無'} />
                <Award title="🔬 傑出研發長 (技術升級最高且生產最多最高級產品)" color="bg-purple-50 border-purple-500" content={s.bestRnD?.rnd ? `${s.bestRnD.rnd.name} (${s.bestRnD.c.name}，Lv${s.bestRnD.tech}，產出 ${s.bestRnD.topOutput} 次)` : '無'} />
                <Award title="📦 傑出採購長 (下游最能壓低成本)" color="bg-indigo-50 border-indigo-500" content={s.bestProc?.proc ? `${s.bestProc.proc.name} (${s.bestProc.c.name}，平均進貨 $${Math.round(s.bestProc.avgCost).toLocaleString()})` : '無'} />
            </div></div>;
        };

        // 稅務結算預覽 Modal — mode='vat' 月結營業稅 / mode='income' 期末營所稅
        const TaxSettleModal = ({ mode, comps, onClose, onConfirm }) => {
            const isVat = mode === 'vat';
            const rows = useMemo(() => Object.values(comps).map(c => {
                if (isVat) {

            const totalTax = rows.reduce((s, r) => s + (r.alreadySettled ? 0 : (r.tax || 0)), 0);

            return <div className="custom-modal-overlay"><div className="custom-modal-lg">

                </div>
                <div className="text-xs text-slate-500 mb-3">

            txs.forEach(t => {

                            = ${totalRevenue.toLocaleString()} ÷ {empCount} = <span className="font-bold text-amber-700">${Math.round(perCapita).toLocaleString()}</span>
                        </div>

                </Section>
            </div></div>;
        };

        const TeacherChartsPicker = ({ comps, onClose, onPick }) => {
            return <div className="custom-modal-overlay"><div className="custom-modal">
                <div className="flex justify-between items-center mb-3"><h3 className="font-bold text-lg text-blue-800">📊 選擇要查看的公司</h3><button onClick={onClose} className="cursor-pointer text-gray-500">✕</button></div>

        const B2BShop = ({ myCompId, allComps, onBuy, notify }) => {

                        {vendor && (

        // 虛擬上游採購 — 只有買方財務需審核，無賣方審核
        const VirtualVendorShop = ({ onBuy, notify }) => {

                        <select className="w-full p-2 border rounded text-xs" value={selectedIdx} onChange={e=>setSelectedIdx(e.target.value)}>

                        <input type="number" min="1" step="1" onKeyDown={blockNonInt} placeholder="採購數量" className="w-full p-2 border rounded text-xs" value={qty} onChange={e=>setQty(e.target.value)} />
                        <Button color="yellow" className="w-full py-1 text-xs" onClick={async ()=>{
                            if(!sel || !qty) return notify("請選擇供應商與商品並輸入數量");

                            await onBuy('req_virtual_buy', { vendorName: sel.vendorName, item: sel.item, price: sel.price, qty: q });

        const SellerQuoteModal = ({ item, allComps, myCompId, onClose, onConfirm }) => {
            const [targetId, setTargetId] = useState("");
            const [price, setPrice] = useState("");
            const [qty, setQty] = useState("");
            return (
                <div className="custom-modal-overlay"><div className="custom-modal text-center">
                    <h3 className="text-lg font-bold mb-2 text-blue-800">B2B 報價單: {item.name}</h3>
                    <p className="text-xs text-slate-500 mb-4">總庫存: {item.quantity} | 平均成本: ${Math.round(item.avgCost)}</p>
                    <div className="space-y-2 mb-4">
                        <select className="w-full p-2 border rounded" value={targetId} onChange={e=>setTargetId(e.target.value)}>

                        </select>
                        <input placeholder="單價" type="number" min="1" step="1" onKeyDown={blockNonInt} className="w-full p-2 border rounded" value={price} onChange={e=>setPrice(e.target.value)} />

                    <div className="flex justify-end gap-2"><Button color="gray" onClick={onClose}>取消</Button><Button onClick={async ()=>{if(targetId&&price&&qty) await onConfirm({itemName: item.name, targetId, price:Number(price), qty:Number(qty)});}}>送出報價</Button></div>
                </div></div>
            );

        function useSystem() {
            const [db, setDb] = useState(null);
            const [mode, setMode] = useState("connecting");
            const [cls, setCls] = useState(() => localStorage.getItem('CE_CLS') || null);
            const [tPwd, setTPwd] = useState(DEFAULT_TEACHER_PWD);
            const [globalNews, setGlobalNews] = useState("");

            useEffect(() => {
                const init = async () => {
                    if(!window.firebaseModules) return;
                    try {
                        const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, getDoc, onSnapshot } = window.firebaseModules;
                        if (!window.firebaseApp) { window.firebaseApp = initializeApp(MY_CONFIG); }
                        await signInAnonymously(getAuth());
                        onAuthStateChanged(getAuth(), async (u) => {
                            if(u) {
                                const fDb = getFirestore();
                                setDb(fDb); setMode("online");
                                try {
                                    const sRef = doc(fDb, 'artifacts', DB_VERSION, 'settings', 'teacher');
                                    onSnapshot(sRef, (snap) => {
                                        if (snap.exists()) {
                                            const d = snap.data();
                                            if (d.password) setTPwd(d.password);
                                            setGlobalNews(d.news || "");
                                        }
                                    });
                                } catch(e){}
                            }
                        });
                    } catch(e) { setMode("error"); console.error(e); }
                };
                let elapsed = 0;
                const t = setInterval(() => { elapsed += 100; if(window.firebaseModules) { clearInterval(t); init(); } else if(elapsed > 10000) { clearInterval(t); setMode("error"); console.error("Firebase SDK 載入逾時"); } }, 100);
                return () => clearInterval(t);
            }, []);

            useEffect(() => { if(cls) localStorage.setItem('CE_CLS', cls); else localStorage.removeItem('CE_CLS'); }, [cls]);
            return { db, mode, cls, setCls, tPwd, setTPwd, globalNews };
        }

        function App() {
            const { db, mode, cls, setCls, tPwd, setTPwd, globalNews } = useSystem();
            const [view, setView] = useState("loading");
            const [user, setUser] = useState(null);
            const [comps, setComps] = useState({});
            const [demands, setDemands] = useState([]);
            const [msg, setMsg] = useState(null);
            const [showPwdModal, setShowPwdModal] = useState(false);
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [showLivingCostConfirm, setShowLivingCostConfirm] = useState(false);
            const [showLeaveConfirm, setShowLeaveConfirm] = useState(false);
            const [showNewsModal, setShowNewsModal] = useState(false);
            const [quoteItem, setQuoteItem] = useState(null);
            const [showReport, setShowReport] = useState(false);
            const [allUsers, setAllUsers] = useState([]);

                // Fix G: 罰款不得讓公司資金變負；若資產不足則自動截斷至 0
                let resultAmount = amount;
                let wasClamped = false;
                try {
                    await runTransaction(db, async (t) => {
                        // 每次 transaction retry 都重置（避免狀態洩漏）
                        resultAmount = amount;
                        wasClamped = false;
                        const snap = await t.get(cRef);
                        if (!snap.exists()) return;
                        const d = snap.data();
                        const curCap = d.capital || 0;
                        if (amount < 0 && curCap + amount < 0) {
                            resultAmount = -curCap; // 只罰到資金歸零為止
                            wasClamped = true;
                        }
                        const newCap = curCap + resultAmount;
                        const actualDesc = wasClamped ? `${desc} (資金不足，已截斷)` : desc;
                        const tx = [{ desc: actualDesc, amount: resultAmount, time: new Date().toLocaleString('zh-TW'), user: "老師" }, ...(d.transactions || [])].slice(0, 500);
                        t.update(cRef, { capital: newCap, transactions: tx });

            const settleAllVat = async () => {
                const { doc, runTransaction } = window.firebaseModules;
                let totalTaxed = 0, count = 0;
                try {
                    for (const c of Object.values(comps)) {
                        const cRef = doc(db, 'artifacts', DB_VERSION, 'classes', cls, 'companies', c.id);
                        await runTransaction(db, async (t) => {
                            const snap = await t.get(cRef);
                            if (!snap.exists()) return;
                            const d = snap.data();
                            const tx = d.transactions || [];
                            const totalSales = tx.filter(isVatRevenue).reduce((s, x) => s + x.amount, 0);
                            const already = d.vatBaseSettled || 0;
                            const taxableBase = Math.max(0, totalSales - already);
                            const tax = Math.round(taxableBase * VAT_RATE);
                            if (tax <= 0) {
                                t.update(cRef, { vatBaseSettled: Math.max(totalSales, already) });
                                return;
                            }
                            const cap = d.capital || 0;
                            const actualTax = Math.min(tax, Math.max(0, cap));
                            const clamped = actualTax < tax;
                            const desc = `營業稅 ${(VAT_RATE*100).toFixed(0)}% (應稅銷售 $${taxableBase.toLocaleString()})` + (clamped ? " (資金不足，已截斷)" : "");
                            const newTx = [{ desc, amount: -actualTax, time: new Date().toLocaleString('zh-TW'), user: "稅務" }, ...tx].slice(0, 500);
                            t.update(cRef, { capital: cap - actualTax, transactions: newTx, vatBaseSettled: Math.max(totalSales, already) });
                            totalTaxed += actualTax; count += 1;
                        });
                    }
                    notify(`✅ 月結營業稅完成，共扣 ${count} 家公司、合計 $${totalTaxed.toLocaleString()}`);

                            const expense = tx.filter(isBusinessExpense).reduce((s, x) => s + Math.abs(x.amount), 0);

                                return;

                            const cap = d.capital || 0;
