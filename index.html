                            }
                            const inventoryUnitCost = (manufactureCost + rawMatTotal) / outputQty;  // 含原料的全成本
                            const req = { id: Date.now().toString() + Math.random().toString(36).slice(2), type: 'teacher_iso', itemName: payload.recipe.name, qty: outputQty, unitCost: inventoryUnitCost, cost: manufactureCost, desc: `生產: ${payload.recipe.name} x${outputQty}`, applicant: user.name, status: 'pending', tag: 'produce', deductedItems, rawMatTotal };
                            t.update(compRef, { inventory: newInv, requests: [...(cDoc.data().requests || []), req] });
                        });
                        notify("📝 ISO 申請已送出");
                    } catch(err) { notify(`❌ ${err.message}`); }
                }
                if (type === 'req_b2b_buy') {
                    if (!payload.qty || payload.qty <= 0) return notify("❌ 數量必須為正整數");
                    if (!payload.price || payload.price <= 0) return notify("❌ 單價必須為正數");
                    if (payload.sellerId === user.companyId) return notify("❌ 不能向自己公司採購");
                    const totalCost = payload.price * payload.qty;
                    const req = { id: Date.now().toString() + Math.random().toString(36).slice(2), type: 'finance_audit', tag: 'b2b_buy', item: payload.item, qty: payload.qty, unitCost: payload.price, cost: totalCost, desc: `採購: 向${payload.vendorName}買 ${payload.item} x${payload.qty}`, vendor: payload.vendorName, sellerId: payload.sellerId, applicant: user.name, status: 'pending' };
                    await updateDoc(compRef, { requests: arrayUnion(req) });
                    notify("📝 採購單已送交財務");
                }
                if (type === 'req_virtual_buy') {
                    if (!payload.qty || payload.qty <= 0) return notify("❌ 數量必須為正整數");
                    if (!payload.price || payload.price <= 0) return notify("❌ 單價異常");
                    const totalCost = payload.price * payload.qty;
                    const req = { id: Date.now().toString() + Math.random().toString(36).slice(2), type: 'finance_audit', tag: 'virtual_buy', item: payload.item, qty: payload.qty, unitCost: payload.price, cost: totalCost, desc: `虛擬廠採購: 向 ${payload.vendorName} 買 ${payload.item} x${payload.qty}`, vendor: payload.vendorName, applicant: user.name, status: 'pending' };
                    await updateDoc(compRef, { requests: arrayUnion(req) });
                    notify("📝 虛擬廠採購單已送交財務");
                }
                if (type === 'upgrade_tech') {
                    if ((comp.techLevel || 1) >= 3) return notify("❌ 已達最高技術等級 (Lv3)");
                    const req = { id: Date.now().toString() + Math.random().toString(36).slice(2), type: 'finance_audit', tag: 'upgrade_tech', item: "技術升級", qty: 1, unitCost: TECH_UPGRADE_COST, cost: TECH_UPGRADE_COST, desc: `研發: 升級至 Lv${(comp.techLevel||1)+1}`, applicant: user.name, status: 'pending' };
                    await updateDoc(compRef, { requests: arrayUnion(req) });
                    notify("📝 升級申請已送交財務");
                }
                if (type === 'req_loan') { await LoanAction(user, user.companyId, payload.amount, db, cls, notify); }
                if (type === 'sell_b2b_quote') {
                    if (!payload.qty || payload.qty <= 0) return notify("❌ 數量必須為正整數");
                    if (!payload.price || payload.price <= 0) return notify("❌ 單價必須為正數");
                    if (payload.targetId === user.companyId) return notify("❌ 不能報價給自己公司");
                    try { deductInventory(comp.inventory, payload.itemName, payload.qty); } catch(e) { return notify(e.message); }
                    const { doc, runTransaction } = window.firebaseModules;
                    const targetRef = doc(db, 'artifacts', DB_VERSION, 'classes', cls, 'companies', payload.targetId);
                    const targetComp = comps[payload.targetId];
                    if (!targetComp) return notify("❌ 找不到目標公司");
                    const isTargetDown = targetComp.type.includes('下游');
                    const reqType = isTargetDown ? 'procure_audit' : 'finance_audit';
                    await runTransaction(db, async (t) => {
                        const cDoc = await t.get(compRef);
                        const tDoc = await t.get(targetRef);
                        const cData = cDoc.data();
                        const newInv = deductInventory(cData.inventory, payload.itemName, payload.qty);
                        const exactCost = getExactFifoCost(cData.inventory, payload.itemName, payload.qty);
                        const req = { id: Date.now().toString() + Math.random().toString(36).slice(2), type: reqType, tag: 'b2b_incoming_quote', sellerId: user.companyId, vendor: comp.name, item: payload.itemName, qty: payload.qty, unitCost: payload.price, cost: payload.price * payload.qty, originalCost: exactCost, desc: `報價: ${comp.name} 銷售 ${payload.itemName} x${payload.qty}`, applicant: user.name, status: 'pending' };
                        t.update(compRef, { inventory: newInv });
                        t.update(targetRef, { requests: [...(tDoc.data().requests || []), req] });
                    });
                    notify("📝 報價單已送出，等待對方審核");
                }
            };

            if (view === 'loading') return <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50"><div className="loader mb-4"></div><p className="text-slate-400 text-sm">🔄 正在恢復您的身分...</p></div>;

            if (view === 'class_select') return (
                <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4 main-container">
                    <NewsBanner text={globalNews} />
                    <div className="absolute top-12 right-4"><FullscreenToggle /></div>
                    <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
                        <h1 className="text-2xl font-bold mb-6 text-slate-800">我的科技業之路</h1>
                        {CLASS_LIST.map(c => <Button key={c.id} className="w-full mb-3 py-3 text-lg" onClick={()=>{setCls(c.id); setView('login');}}>{c.name}</Button>)}
                        <div className="text-xs text-gray-400 mt-4">{mode==='online'?'🟢 雲端連線':'🔴 連線中...'}</div>
                    </div>
                </div>
            );

            if (view === 'login') return (
                <div className="min-h-screen flex items-center justify-center bg-slate-50 p-4 main-container">
                    <div className="absolute top-4 right-4"><FullscreenToggle /></div>
                    <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm">
                        <button onClick={()=>{setCls(null); setView('class_select');}} className="cursor-pointer text-sm text-slate-400 mb-4">⬅ 回選單</button>
                        <div className="bg-blue-50 p-4 rounded-lg mb-6 border border-blue-100">
                            <h3 className="font-bold text-blue-800 mb-2">學生登入/註冊</h3>
                            <input id="sName" placeholder="姓名" className="w-full p-2 border rounded mb-2" />
                            <input id="sPwd" type="password" placeholder="密碼" className="w-full p-2 border rounded mb-2" />
                            <Button className="w-full" onClick={async ()=>{ const n=document.getElementById('sName').value, p=document.getElementById('sPwd').value; if(!n||!p)return notify("請輸入完整"); await handleLogin(n, p); }}>進入系統</Button>
                        </div>
                        <div className="border-t pt-4">
                            <h3 className="font-bold text-slate-700 mb-2">老師登入</h3>
                            <input id="tPwd" type="password" placeholder="老師密碼" className="w-full p-2 border rounded mb-2" />
                            <Button color="gray" className="w-full" onClick={handleTeacherLogin}>進入中控台</Button>
                        </div>
                    </div>
                    {msg && <div className="notification-toast">{msg}</div>}
                </div>
            );

            if (view === 'personal') {
                if(!user) return null;
                return (
                    <div className="min-h-screen bg-slate-100 p-4 fade-in main-container">
                        <NewsBanner text={globalNews} />
                        <header className="bg-white p-4 rounded-xl shadow mb-4 flex justify-between items-center flex-wrap gap-2">
                            <div>
                                <h1 className="font-bold text-xl">{user.name}{user.isBankrupt && <span className="ml-2 text-xs bg-red-600 text-white px-2 py-0.5 rounded">💀 已破產</span>}</h1>
                                <p className="text-sm text-slate-500">存款: <span className={`font-mono font-bold ${(user.personalBalance || 0) < 0 ? 'text-red-600' : 'text-emerald-600'}`}>${(user.personalBalance || 0).toLocaleString()}</span></p>
                                <p className="text-xs text-slate-400">每月生活費試算：${computeTotalLivingCost(user).toLocaleString()} (基礎 ${computeBaseLiving(user).toLocaleString()} + 房 ${computeMonthlyHousing(user).toLocaleString()})</p>
                                {(user.missedLivingCost || 0) > 0 && !user.isBankrupt && <p className="text-xs text-red-600 font-bold">⚠️ 已連續 {user.missedLivingCost} 次付不出生活費，再 1 次將宣告破產！</p>}
                            </div>
                            <div className="flex gap-2 flex-wrap">
                                <Button color="blue" className="text-xs px-2 py-1" onClick={()=>setShowHousing(true)}>🏠 住屋</Button>
                                <Button color="purple" className="text-xs px-2 py-1" onClick={()=>setShowFamily(true)}>👨‍👩‍👧 家庭</Button>
                                <Button color="green" className="text-xs px-2 py-1" onClick={()=>setShowResume(true)}>📄 履歷</Button>
                                <Button color="yellow" className="text-xs px-2 py-1" onClick={()=>setShowPwdModal(true)}>🔑 修改密碼</Button>
                                <FullscreenToggle />
                                <Button color="gray" onClick={doLogout}>登出</Button>
                            </div>
                        </header>
                        {user.companyId ? (
                            <div className="bg-white p-8 rounded-xl shadow text-center">
                                <h2 className="text-2xl font-bold mb-2">您任職於：{comps[user.companyId]?.name}</h2>
                                <p className="mb-4 text-lg">職位：<span className={`role-badge role-${ROLE_CLASS_MAP[user.role] || 'default'}`}>{user.role}</span> | 月薪：${(user.salary || 0).toLocaleString()}</p>
                                <div className="flex gap-4 justify-center"><Button className="px-8 py-4 text-xl shadow-lg" onClick={()=>setView('company')}>🏢 進入公司</Button><Button color="red" onClick={()=>setShowLeaveConfirm(true)}>👋 離職</Button></div>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {Object.keys(comps).length === 0 ? <div className="text-center py-10 text-slate-400">⚠️ 系統尚未初始化...</div> :
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {Object.values(comps).map(c => {
                                            const hasCEO = (c.employees||[]).some(e=>e.role==='CEO');
                                            const isDown = c.type.includes('下游');
                                            const displayRoles = isDown ? ROLES.map(r=>r==='研發經理'?'採購經理':r) : ROLES;
                                            return (
                                                <Card key={c.id} className="hover:shadow-md transition-shadow">
                                                    <div className="flex justify-between items-center mb-3"><h3 className="font-bold text-lg">{c.name}</h3><span className="text-xs bg-slate-100 px-2 py-1 rounded text-slate-500">{c.type}</span></div>
                                                    <div className="flex gap-2">
                                                        <select id={`role-${c.id}`} className="p-2 border rounded text-sm flex-1">{displayRoles.map(r=><option key={r} value={r}>{r}</option>)}</select>
                                                        <Button onClick={async ()=>{
                                                            let r = document.getElementById(`role-${c.id}`).value;
                                                            const dbRole = r;
                                                            const {doc,updateDoc,arrayUnion}=window.firebaseModules;
                                                            try {
                                                                if (dbRole === 'CEO') {
                                                                    if (hasCEO) return notify("該公司已有 CEO！");
                                                                    const sal = ROLE_SALARIES['CEO'];
                                                                    const {runTransaction} = window.firebaseModules;
                                                                    const userRefCEO = doc(db,'artifacts',DB_VERSION,'classes',cls,'users',user.id);
                                                                    const compRefCEO = doc(db,'artifacts',DB_VERSION,'classes',cls,'companies',c.id);
                                                                    try {
                                                                        await runTransaction(db, async (t) => {
                                                                            const cSnap = await t.get(compRefCEO);
                                                                            const uSnap = await t.get(userRefCEO);
                                                                            if (!cSnap.exists()) throw new Error("公司不存在");
                                                                            if (uSnap.exists() && uSnap.data().companyId) throw new Error("您已任職其他公司，請先離職");
                                                                            const currentEmps = cSnap.data().employees || [];
                                                                            if (currentEmps.some(e => e.role === 'CEO')) throw new Error("該公司已有 CEO！");
                                                                            t.update(userRefCEO, {companyId:c.id, role:'CEO', salary:sal, currentJoinDate: new Date().toLocaleDateString('zh-TW')});
                                                                            t.update(compRefCEO, {employees: [...currentEmps, {id:user.id, name:user.name, role:'CEO', salary:sal}]});
                                                                        });
                                                                        setUser({...user, companyId:c.id, role:'CEO', salary:sal});
                                                                        setView('company');
                                                                    } catch (err) { return notify("❌ " + err.message); }
                                                                } else {
                                                                    const req = {id:Date.now().toString() + Math.random().toString(36).slice(2), type:'job_application', userId:user.id, name:user.name, role:dbRole, status:'pending'};
                                                                    await updateDoc(doc(db,'artifacts',DB_VERSION,'classes',cls,'companies',c.id), {requests:arrayUnion(req)});
                                                                    notify("📝 面試申請已送出");
                                                                }
                                                            } catch(e) { notify("操作失敗"); }
                                                        }}>應徵</Button>
                                                    </div>
                                                </Card>
                                            );
                                        })}
                                    </div>
                                }
                            </div>
                        )}
                        {showPwdModal && <PwdModal onClose={()=>setShowPwdModal(false)} onSubmit={handleChangePassword} />}
                        {showLeaveConfirm && <ConfirmModal title="離職確認" message="確定要離開公司嗎？" onConfirm={handleLeave} onCancel={()=>setShowLeaveConfirm(false)} />}
                        {showHousing && <HousingModal user={user} onClose={()=>setShowHousing(false)} onConfirm={updateHousing} />}
                        {showFamily && <FamilyModal user={user} onClose={()=>setShowFamily(false)} onConfirm={updateFamily} />}
                        {showResume && <ResumeModal user={user} comps={comps} onClose={()=>setShowResume(false)} />}
                        {user.orphanagePending && <OrphanageModal studentName={user.name} children={user.children || 0} onClose={dismissOrphanage} />}
                        {msg && <div className="notification-toast">{msg}</div>}
                    </div>
                );
            }

            if (view === 'company') {
                const c = comps[user.companyId];
                if(!c) return <div className="p-10 text-center">Loading...</div>;
                const role = user.role;
                const isCEO = role==='CEO';
                const isHR = role==='人資經理' || isCEO;
                const isFin = role==='財務長';
                const isSales = role==='業務經理';
                const isDownstream = c.type.includes('下游');
                const isProcure = role==='採購經理' || (isDownstream && role==='研發經理');
                const isRnD = role==='研發經理' && !isDownstream;
                const techLvl = c.techLevel || 1;
                const aggInventory = getAggregatedInventory(c.inventory);

                return (
                    <div className="min-h-screen bg-slate-100 pb-20 fade-in main-container">
                        <NewsBanner text={globalNews} />
                        <header className="bg-white p-4 shadow sticky top-0 z-20 flex justify-between items-center flex-wrap gap-2">
                            <div><h1 className="font-bold text-lg">{c.name} <span className="text-xs bg-purple-100 text-purple-700 px-2 rounded">Lv{techLvl}</span></h1><span className={`role-badge role-${ROLE_CLASS_MAP[role] || 'default'}`}>{user.name} ({role})</span></div>
                            <div className="flex gap-2">
                                {isCEO && <Button color="blue" className="text-sm py-1" onClick={()=>setShowCharts(c)}>📊 全部圖表</Button>}
                                {!isCEO && (isFin || isSales || isHR || isProcure || isRnD) && <Button color="blue" className="text-sm py-1" onClick={()=>setShowCharts(c)}>📈 我的圖表</Button>}
                                <FullscreenToggle />
                                <Button color="gray" className="text-sm py-1" onClick={()=>setView('personal')}>離開</Button>
                            </div>
                        </header>
                        <div className="p-4 max-w-4xl mx-auto space-y-6">
                            <div className="grid grid-cols-2 gap-4">
                                <Card className="text-center border-l-4 border-emerald-500"><div className="text-slate-500 text-sm">公司資金</div><div className={`text-2xl font-bold ${c.capital<0?'text-red-600':'text-emerald-600'}`}>${c.capital.toLocaleString()}</div></Card>
                                <Card className="text-center border-l-4 border-blue-500"><div className="text-slate-500 text-sm">庫存總量</div><div className="text-2xl font-bold">{c.inventory.reduce((a,b)=>a+(b.quantity||0),0)}</div></Card>
                            </div>

                            {isHR && (
                                <Card className="border-t-4 border-amber-400 relative">
                                    <div className="absolute top-0 right-0 bg-amber-100 text-amber-800 text-xs px-2 py-1 rounded-bl">HR</div>
                                    <h3 className="font-bold text-amber-800 mb-4">👥 人力資源</h3>
                                    <div className="mb-4">
                                        <h4 className="font-bold text-sm text-slate-600 mb-2">求職信箱</h4>
                                        {c.requests.filter(r=>r.type==='job_application').length===0 ? <p className="text-xs text-slate-400">無申請</p> : c.requests.filter(r=>r.type==='job_application').map(req => (
                                            <div key={req.id} className="flex justify-between items-center bg-slate-50 p-2 rounded mb-1 border">
                                                <span className="text-sm"><b>{req.name}</b> 應徵 {req.role}</span>
                                                <div className="flex gap-1">
                                                    <input id={`sal-${req.id}`} type="number" min="0" step="1" onKeyDown={blockNonInt} placeholder="薪資" className="w-20 p-1 border rounded text-xs" defaultValue={ROLE_SALARIES[isDownstream && req.role==='研發經理' ? '採購經理' : req.role] || 40000} />
                                                    <Button color="green" className="py-0 px-2 text-xs" onClick={()=>hrAction('hire', {userId:req.userId, name:req.name, role:req.role, salary:document.getElementById(`sal-${req.id}`).value, reqId:req.id})}>錄取</Button>
                                                    <Button color="red" className="py-0 px-2 text-xs" onClick={()=>hrAction('reject', {reqId:req.id})}>拒</Button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div>
                                        <h4 className="font-bold text-sm text-slate-600 mb-2">員工管理 & 薪資調整</h4>
                                        <div className="space-y-2">
                                            {(c.employees||[]).map(e => (
                                                <div key={e.id} className="bg-slate-50 p-2 rounded text-sm border">
                                                    <div className="flex justify-between items-center mb-1">
                                                        <span className="font-bold">{e.name} <span className="font-normal text-slate-500">({e.role})</span></span>
                                                        {e.role !== 'CEO' && <Button color="red" className="py-0 px-1 text-xs" onClick={()=>hrAction('fire', {userId:e.id, name:e.name, role:e.role})}>解雇</Button>}
                                                    </div>
                                                    <div className="flex gap-2 items-center">
                                                        <span className="text-xs text-slate-500">月薪:</span>
                                                        <input key={e.salary} id={`sal-adj-${e.id}`} type="number" min="0" step="1" onKeyDown={blockNonInt} defaultValue={e.salary || 40000} className="w-20 p-1 border rounded text-xs" />
                                                        <Button color="blue" className="py-0 px-2 text-xs" onClick={async ()=>{ const newSal = document.getElementById(`sal-adj-${e.id}`).value; if(newSal) await hrAction('set_salary', {userId:e.id, salary:newSal}); }}>調薪</Button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </Card>
                            )}

                            {isFin && (
                                <Card className="border-t-4 border-emerald-500 relative">
                                    <div className="absolute top-0 right-0 bg-emerald-100 text-emerald-800 text-xs px-2 py-1 rounded-bl">財務</div>
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-bold text-emerald-800">💰 財務審核</h3>
                                        <Button color="purple" onClick={() => setShowReport(true)}>📊 查看財務報表</Button>
                                    </div>
                                    <div className="flex gap-2 mb-4">
                                        <Button color="blue" className="flex-1 py-3" onClick={()=>financeAction('pay_all')}>💸 發放薪資</Button>
                                        <div className="flex-1 flex gap-1 items-center border p-1 rounded bg-slate-50"><span className="text-xs font-bold whitespace-nowrap">分紅%</span><input id="bonusInput" type="number" min="0" step="1" onKeyDown={blockNonInt} defaultValue={c.bonusRatio} className="w-full p-1 border rounded text-xs" /><Button className="py-1 px-2 text-xs" onClick={()=>financeAction('set_bonus', {ratio:document.getElementById('bonusInput').value})}>設</Button></div>
                                    </div>
                                    <div className="mt-2 border-t pt-2 mb-4">
                                        <h4 className="font-bold text-sm text-slate-600 mb-2">🏦 資金週轉</h4>
                                        <div className="flex gap-2">
                                            <input id="loanAmt" type="number" min="1" step="1" onKeyDown={blockNonInt} placeholder="金額" className="w-full p-1 border rounded text-xs" />
                                            <Button color="purple" className="py-0 px-2 text-xs" onClick={async ()=>{ const amt = document.getElementById('loanAmt').value; if(!amt) return; await LoanAction(user, user.companyId, Number(amt), db, cls, notify); document.getElementById('loanAmt').value = ""; }}>申請貸款</Button>
                                        </div>
                                        <div className="mt-1 text-xs text-slate-400">目前負債: ${(c.loan||0).toLocaleString()} (申請需老師核准)</div>
                                    </div>
                                    <h4 className="font-bold text-sm text-slate-600 mb-2">待審單據 ({c.requests.filter(r=>r.type==='finance_audit').length})</h4>
                                    {c.requests.filter(r=>r.type==='finance_audit').map(req => (
                                        <div key={req.id} className="bg-red-50 p-2 rounded mb-2 border border-red-100">
                                            <div className="text-sm mb-1"><b>{req.desc}</b> (${req.cost.toLocaleString()})</div>
                                            {req.tag==='b2b_buy' && <div className="text-xs text-blue-600 mb-1">對象: {req.vendor}</div>}
                                            {req.tag==='b2b_incoming_quote' && <div className="text-xs text-purple-600 mb-1">來自賣方: {req.vendor} 的報價</div>}
                                            <div className="flex justify-end gap-2"><Button color="green" className="py-0 px-3 text-xs" onClick={()=>financeAction('audit', {req, approve:true})}>准許</Button><Button color="red" className="py-0 px-3 text-xs" onClick={()=>financeAction('audit', {req, approve:false})}>駁回</Button></div>
                                        </div>
                                    ))}
                                    <div className="mt-4"><h4 className="font-bold text-sm text-slate-600">全公司薪資表</h4><div className="max-h-32 overflow-y-auto border p-2 rounded bg-slate-50 text-xs">{(c.employees||[]).map(e=>(<div key={e.id} className="flex justify-between"><span>{e.name}</span><span>${(e.salary||0).toLocaleString()}</span></div>))}</div></div>
                                </Card>
                            )}

                            <Card className="border-t-4 border-blue-500 relative">
                                <div className="absolute top-0 right-0 bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-bl">營運</div>
                                <h3 className="font-bold text-slate-700 mb-4">🏭 營運操作</h3>

                                {(isCEO || isRnD) && !isDownstream && (
                                    <div className="mb-4 pb-4 border-b">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="font-bold text-sm text-purple-800">🚀 科技研發 (目前 Lv{techLvl})</span>
                                            {techLvl < 3 && <Button color="purple" className="py-0 px-2 text-xs" onClick={()=>opAction('upgrade_tech')}>升級 (費用${TECH_UPGRADE_COST.toLocaleString()})</Button>}
                                        </div>
                                    </div>
                                )}

                                {(isRnD || isProcure) && (
                                    <div className="space-y-4 mb-6 pb-4 border-b">
                                        <B2BShop myCompId={c.id} allComps={comps} onBuy={opAction} notify={notify} />
                                        {!c.type.includes('上游') && <VirtualVendorShop onBuy={opAction} notify={notify} />}
                                        {!isDownstream && (
                                            <div className="bg-slate-50 p-3 rounded">
                                                <h4 className="font-bold text-sm mb-2 text-blue-800">🚚 原料進口 (向老師購買)</h4>
                                                {RAW_MATS[c.id] ? (<div className="flex gap-2 items-center"><span className="text-sm flex-1">{RAW_MATS[c.id].name} (${RAW_MATS[c.id].cost.toLocaleString()})</span><input id="buyQty" type="number" min="1" step="1" onKeyDown={blockNonInt} placeholder="數量" className="w-16 p-1 border rounded" /><Button className="py-1 text-xs" onClick={async ()=>{ const q=document.getElementById('buyQty').value; if(!q) return; await opAction('req_buy', {item:RAW_MATS[c.id].name, cost:RAW_MATS[c.id].cost, qty:Number(q), vendor:"進口"}); }}>申請</Button></div>) : (<p className="text-xs text-slate-400">本公司無需進口基礎原料，請使用上方 B2B 採購。</p>)}
                                            </div>
                                        )}
                                        {!isDownstream && RECIPES[c.id] && (
                                            <div className="bg-slate-50 p-3 rounded mt-4">
                                                <h4 className="font-bold text-sm mb-2 text-purple-800">🔨 生產 (需審核)</h4>
                                                {Object.entries(RECIPES[c.id]).filter(([lvl]) => Number(lvl) <= techLvl).map(([lvl, recipe]) => (
                                                    <div key={lvl} className="mb-2 border-b pb-2 last:border-0">
                                                        <div className="flex justify-between text-xs font-bold mb-1">
                                                            <span>Lv{lvl} {recipe.name}</span>
                                                            <span className="text-slate-500">${(recipe.cost/recipe.yield).toLocaleString()}/個</span>
                                                        </div>
                                                        <div className="flex gap-2 items-center">
                                                            <span className="text-xs flex-1 text-slate-500">需: {recipe.needs.map(n=>`${n.name}x${n.qty}`).join(', ')}</span>
                                                            <input id={`prodQty-${lvl}`} type="number" min="1" step="1" onKeyDown={blockNonInt} placeholder="批次" className="w-12 p-1 border rounded text-xs" />
                                                            <Button color="green" className="py-0 px-2 text-xs" onClick={async ()=>{ const q=document.getElementById(`prodQty-${lvl}`).value; if(!q) return; await opAction('req_produce', {recipe, qty:Number(q)}); }}>生產</Button>
                                                        </div>
                                                    </div>
                                                ))}
                                                <div className="mt-2 text-xs space-y-1">{(c.requests||[]).filter(r => r.tag==='produce' || r.type==='teacher_iso').map(r => (<div key={r.id} className="flex items-center gap-1 text-purple-600"><span>⏳ {r.desc}</span><span className="bg-white px-1 border rounded">{r.type==='teacher_iso'?'等老師 ISO':'等財務'}</span></div>))}</div>
                                            </div>
                                        )}
                                        {isDownstream && (
                                            <div className="mt-4">
                                                <h4 className="font-bold text-sm mb-2 text-purple-800">📦 採購審核 (進貨單)</h4>
                                                <div className="space-y-2">
                                                    {c.requests.filter(r=>r.type==='procure_audit').length===0 ? <p className="text-xs text-slate-400">無待審報價單</p> :
                                                        c.requests.filter(r=>r.type==='procure_audit').map(req => (
                                                            <div key={req.id} className="bg-blue-50 p-2 rounded mb-2 border border-blue-100">
                                                                <div className="text-sm mb-1"><b>{req.desc}</b> (${req.cost.toLocaleString()})</div>
                                                                <div className="text-xs text-slate-500 mb-2">來自: {req.vendor}</div>
                                                                <div className="flex justify-end gap-2">
                                                                    <Button color="green" className="py-0 px-3 text-xs" onClick={()=>procureAction('approve', req, db, cls, user, notify)}>准許 (轉財務)</Button>
                                                                    <Button color="red" className="py-0 px-3 text-xs" onClick={()=>procureAction('reject', req, db, cls, user, notify)}>駁回</Button>
                                                                </div>
                                                            </div>
                                                        ))
                                                    }
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {isSales && (
                                    <div>
                                        <h4 className="font-bold text-sm mb-2 text-blue-800">💵 銷售 & 報價</h4>
                                        <div className="mb-4 bg-blue-50 p-2 rounded border border-blue-200">
                                            <h5 className="font-bold text-xs text-blue-800 mb-2">🛒 待審核的同業訂單 (買方發來)</h5>
                                            {c.requests.filter(r => r.type === 'sales_audit').length === 0 ? (
                                                <span className="text-xs text-slate-400">目前無待處理訂單</span>
                                            ) : (
                                                c.requests.filter(r => r.type === 'sales_audit').map(req => (
                                                    <div key={req.id} className="bg-white p-2 rounded mb-2 border shadow-sm text-xs">
                                                        <div className="mb-1"><b>{req.buyerName}</b> 欲採購：</div>
                                                        <div className="text-blue-700 font-bold">{req.item} x{req.qty}</div>
                                                        <div className="text-slate-500 mb-2">總金額：${req.cost.toLocaleString()} (單價 ${req.unitCost})</div>
                                                        <div className="flex gap-2 justify-end">
                                                            <Button color="green" className="py-0 px-2" onClick={() => salesAction('approve', req)}>同意出貨</Button>
                                                            <Button color="red" className="py-0 px-2" onClick={() => salesAction('reject', req)}>拒絕</Button>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                        <div className="mb-4 bg-purple-50 p-2 rounded border border-purple-200">
                                            <h5 className="font-bold text-xs text-purple-800 mb-2">📤 主動報價給下游 (B2B)</h5>
                                            {aggInventory.map((item, idx) => (
                                                <div key={`qt-${idx}`} className="flex justify-between items-center mb-1 text-xs">
                                                    <span>{item.name} (剩{item.quantity})</span>
                                                    <Button color="purple" className="py-0 px-2" onClick={()=>setQuoteItem(item)}>報價</Button>
                                                </div>
                                            ))}
                                            {aggInventory.length===0 && <span className="text-xs text-slate-400">無庫存可報價</span>}
                                        </div>
                                        {isDownstream && (
                                            <div className="mt-4 pt-2 border-t">
                                                <h4 className="font-bold text-sm mb-2 text-amber-800">📢 參與競標 (政府採購)</h4>
                                                <p className="text-xs text-slate-500 mb-2">請注意老師發布的採購需求，得標後自動出貨。</p>
                                                {demands.filter(d=>d.status==='open').map(d => (
                                                    <div key={d.id} className="bg-amber-50 p-2 mb-1 rounded flex justify-between items-center text-xs">
                                                        <span>{d.item} x{d.qty}</span>
                                                        <div className="flex gap-1">
                                                            <input id={`quote-${d.id}`} type="number" min="1" step="1" onKeyDown={blockNonInt} placeholder="$" className="w-16 border rounded" />
                                                            <Button onClick={async ()=>{ const p=document.getElementById(`quote-${d.id}`).value; if(p) await submitQuote(d.id, p); }}>報價</Button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}
                                <div className="mt-4 border-t pt-2"><h4 className="font-bold text-sm text-slate-600">📦 庫存清單</h4><div className="text-xs space-y-1 bg-white border p-2 rounded max-h-24 overflow-y-auto">{aggInventory.length===0?"無":aggInventory.map((i,k)=><div key={k} className="flex justify-between"><span>{i.name} (源:{i.source})</span><span>x{i.quantity} (均本:${Math.round(i.avgCost)})</span></div>)}</div></div>
                            </Card>
                        </div>

                        {quoteItem && <SellerQuoteModal item={quoteItem} allComps={comps} myCompId={c.id} onClose={()=>setQuoteItem(null)} onConfirm={async (payload)=>{ await opAction('sell_b2b_quote', payload); setQuoteItem(null); }} />}
                        {showReport && <FinancialReportModal transactions={c.transactions} capital={c.capital} onClose={()=>setShowReport(false)} />}
                        {showCharts && <CompanyChartsModal company={showCharts} scope={isCEO ? 'all' : (isFin ? 'finance' : isRnD ? 'rnd' : isSales ? 'sales' : (role === '人資經理' ? 'hr' : isProcure ? 'procure' : 'all'))} onClose={()=>setShowCharts(null)} />}
                        {msg && <div className="notification-toast">{msg}</div>}
                    </div>
                );
            }

            if (view === 'teacher') {
                return (
                    <div className="min-h-screen bg-slate-100 p-4 pb-20 fade-in main-container">
                        <NewsBanner text={globalNews} onTeacherDismiss={clearGlobalNews} />
                        <header className="flex justify-between items-center mb-6 flex-wrap gap-2">
                            <h1 className="font-bold text-xl">👨‍🏫 中控台 ({CLASS_LIST.find(x=>x.id===cls)?.name})</h1>
                            <div className="flex gap-2 flex-wrap">
                                <Button color="yellow" onClick={()=>setShowPwdModal(true)}>密碼</Button>
                                <Button color="yellow" onClick={()=>setShowResetPwd(true)}>🔑 重置學生密碼</Button>
                                <Button color="purple" onClick={()=>setShowNewsModal(true)}>📣 新聞</Button>
                                <Button color="blue" onClick={()=>setShowLivingCostConfirm(true)}>扣生活費</Button>
                                <Button color="blue" onClick={()=>setTaxModal('vat')}>📅 月結營業稅</Button>
                                <Button color="yellow" onClick={()=>setTaxModal('income')}>📆 期末營所稅</Button>
                                <Button color="gray" className="text-xs px-2" onClick={()=>setShowResetTaxConfirm(true)}>🔓 重置稅務</Button>
                                <Button color="purple" onClick={()=>setShowHistory(true)}>📋 學生歷程</Button>
                                <Button color="green" onClick={()=>setShowSettlement(true)}>🏆 結算</Button>
                                <Button color="blue" onClick={()=>setShowTeacherCharts(true)}>📊 公司圖表</Button>
                                <Button color="red" onClick={()=>setShowResetConfirm(true)}>重置</Button>
                                <FullscreenToggle />
                                <Button color="gray" onClick={doLogout}>登出</Button>
                            </div>
                        </header>

                        <Card className="mb-6 border-l-4 border-blue-500 bg-blue-50">
                            <h3 className="font-bold text-blue-800 mb-2">📢 政府採購需求</h3>
                            <div className="flex gap-2 mb-4">
                                <select id="demandItem" className="p-2 rounded border flex-1">
                                    <option value="">選擇採購商品...</option>
                                    {ALL_PRODUCTS.map(p => <option key={p} value={p}>{p}</option>)}
                                </select>
                                <input id="demandQty" placeholder="數量" type="number" min="1" step="1" onKeyDown={blockNonInt} className="p-2 rounded border w-20" />
                                <Button onClick={async ()=>{ const i=document.getElementById('demandItem').value, q=document.getElementById('demandQty').value; if(!i||!q) return; await teacherAction('post_demand', {item:i, qty:Number(q)}); }}>發布</Button>
                            </div>
                            <div className="space-y-2">
                                {demands.filter(d=>d.status==='open').map(d => (
                                    <div key={d.id} className="bg-white p-3 rounded shadow-sm">
                                        <div className="font-bold text-sm mb-2">{d.item} x{d.qty}</div>
                                        {d.quotes.map((q, idx) => (
                                            <div key={idx} className="flex justify-between items-center bg-slate-50 p-1 mb-1 rounded text-xs">
                                                <span>{q.companyName}: ${q.price.toLocaleString()}</span>
                                                <div className="flex gap-1">
                                                    <Button color="green" className="py-0 px-2" onClick={()=>teacherAction('accept_quote', {demandId:d.id, quote:q, demandItem:d.item, demandQty:d.qty})}>成交</Button>
                                                    <Button color="red" className="py-0 px-2" onClick={()=>deleteDemandQuote(d.id, idx)}>刪除</Button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        </Card>

                        {Object.values(comps).flatMap(c=>c.requests.filter(r=>r.type==='teacher_loan').map(r=>({...r, compId:c.id, compName:c.name}))).length > 0 && (
                            <Card className="mb-6 border-l-4 border-amber-500 bg-amber-50">
                                <h3 className="font-bold text-amber-800 mb-2">🏦 貸款申請審核</h3>
                                {Object.values(comps).flatMap(c=>c.requests.filter(r=>r.type==='teacher_loan').map(r=>({...r, compId:c.id, compName:c.name}))).map(req => (
                                    <div key={req.id} className="flex justify-between items-center bg-white p-2 rounded mb-1 shadow-sm">
                                        <span className="text-sm"><b>{req.compName}</b> 申請貸款 <span className="text-red-600 font-bold">${req.amount.toLocaleString()}</span></span>
                                        <div className="flex gap-1">
                                            <Button color="green" className="py-0 px-2 text-xs" onClick={()=>TeacherLoanAction(req.compId, req.id, true, req.amount, db, cls, notify, safeRemoveRequest)}>核准</Button>
                                            <Button color="red" className="py-0 px-2 text-xs" onClick={()=>TeacherLoanAction(req.compId, req.id, false, 0, db, cls, notify, safeRemoveRequest)}>駁回</Button>
                                        </div>
                                    </div>
                                ))}
                            </Card>
                        )}

                        {Object.values(comps).flatMap(c=>c.requests.filter(r=>r.type==='teacher_iso').map(r=>({...r, compId:c.id, compName:c.name}))).length > 0 && (
                            <Card className="mb-6 border-l-4 border-purple-500 bg-purple-50">
                                <h3 className="font-bold text-purple-800 mb-2">🏭 ISO 審核</h3>
                                {Object.values(comps).flatMap(c=>c.requests.filter(r=>r.type==='teacher_iso').map(r=>({...r, compId:c.id, compName:c.name}))).map(req => (
                                    <div key={req.id} className="flex justify-between items-center bg-white p-2 rounded mb-1 shadow-sm">
                                        <span className="text-sm"><b>{req.compName}</b> 產 {req.desc}</span>
                                        <div className="flex gap-1">
                                            <Button color="green" className="py-0 px-2 text-xs" onClick={async () => {
                                                const {doc, runTransaction} = window.firebaseModules;
                                                const cRef = doc(db, 'artifacts', DB_VERSION, 'classes', cls, 'companies', req.compId);
                                                let processed = false;
                                                await runTransaction(db, async (t) => {
                                                    const cDoc = await t.get(cRef);
                                                    const currentReqs = cDoc.data().requests || [];
                                                    if (!currentReqs.some(r => r.id === req.id && r.type === 'teacher_iso')) return;
                                                    processed = true;
                                                    const newReqs = currentReqs.filter(r => r.id !== req.id);
                                                    const finReq = { ...req, type: 'finance_audit', tag: 'produce', desc: `生產成本: ${req.itemName} x${req.qty}`, item: req.itemName, cost: req.cost, unitCost: req.unitCost, qty: req.qty };
                                                    t.update(cRef, { requests: [...newReqs, finReq] });
                                                });
                                                notify(processed ? "✅ ISO 通過" : "⚠️ 此申請已處理過");
                                            }}>通過</Button>
                                            <Button color="red" className="py-0 px-2 text-xs" onClick={async () => {
                                                const {doc, runTransaction} = window.firebaseModules;
                                                const cRef = doc(db, 'artifacts', DB_VERSION, 'classes', cls, 'companies', req.compId);
                                                let processed = false;
                                                await runTransaction(db, async (t) => {
                                                    const cSnap = await t.get(cRef);
                                                    const currentReqs = cSnap.data().requests || [];
                                                    if (!currentReqs.some(r => r.id === req.id)) return;
                                                    processed = true;
                                                    let currentInv = [...(cSnap.data().inventory || [])];
                                                    (req.deductedItems || []).forEach(item => {
                                                        currentInv.push({
                                                            id: `${Date.now()}-${Math.random().toString(36).slice(2)}`,
                                                            name: item.name,
                                                            cost: item.cost || 0,
                                                            quantity: item.qty,
                                                            source: "ISO駁回退回"
                                                        });
                                                    });
                                                    const newReqs = currentReqs.filter(r => r.id !== req.id);
                                                    t.update(cRef, { inventory: currentInv, requests: newReqs });
                                                });
                                                notify(processed ? "已駁回，原物料已退回" : "⚠️ 此申請已處理過");
                                            }}>駁回</Button>
                                        </div>
                                    </div>
                                ))}
                            </Card>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            {Object.values(comps).sort((a,b)=>parseInt(a.id.split('-')[1])-parseInt(b.id.split('-')[1])).map(c => (
                                <Card key={c.id}>
                                    <div className="flex justify-between items-center mb-2"><h3 className="font-bold">{c.name}</h3><span className={c.capital<0?"text-red-600 font-mono":"text-emerald-600 font-mono"}>${c.capital.toLocaleString()}</span></div>
                                    <div className="bg-slate-50 p-2 rounded mb-2 text-xs max-h-32 overflow-y-auto">
                                        <p className="font-bold text-slate-500">員工 ({c.employees?.length||0})</p>
                                        {(c.employees||[]).map(e=><div key={e.id} className="flex justify-between"><span>{e.name} ({e.role})</span><span>${(e.salary||0).toLocaleString()}</span></div>)}
                                    </div>
                                    <div className="flex gap-2 mt-2 flex-wrap">
                                        <Button color="red" className="flex-1 py-1 text-xs" onClick={()=>setFineModal({compId:c.id, compName:c.name})}>💸 罰款</Button>
                                        <Button color="green" className="flex-1 py-1 text-xs" onClick={()=>setBonusModal({compId:c.id, compName:c.name})}>🎁 發獎金</Button>
                                        <Button color="blue" className="flex-1 py-1 text-xs" onClick={()=>setShowCharts(c)}>📈 圖表</Button>
                                    </div>
                                </Card>
                            ))}
                        </div>
                        {showResetConfirm && <ConfirmModal title="⚠️ 嚴重警告" message={`確定要「徹底重置」${CLASS_LIST.find(c=>c.id===cls)?.name} 嗎？\n\n1. 所有公司資金、庫存、交易紀錄清空\n2. 所有學生帳號「完全刪除」(含住屋、家庭、履歷、存款、密碼等所有資料)\n3. 所有政府採購需求刪除\n\n適用於新學期開始、換一批學生時使用。\n學生下次登入時會以新帳號重新建立。`} onConfirm={handleInitConfirm} onCancel={()=>setShowResetConfirm(false)} />}
                        {showLivingCostConfirm && <ConfirmModal title="扣除生活費" message={`將依照每位學生的「基礎生活費 + 每月房屋費用」進行扣款。\n單身基礎 $${BASE_LIVING_SINGLE.toLocaleString()} / 已婚 $${BASE_LIVING_MARRIED.toLocaleString()} + 小孩數 × $${CHILD_COST.toLocaleString()}。\n\n連續 2 次付不出 → 宣告破產，若有小孩會進入孤兒院畫面。`} onConfirm={chargeLivingCostConfirm} onCancel={()=>setShowLivingCostConfirm(false)} />}
                        {showPwdModal && <PwdModal onClose={()=>setShowPwdModal(false)} onSubmit={handleChangePassword} />}
                        {showNewsModal && <NewsModal onClose={()=>setShowNewsModal(false)} onSubmit={updateNews} />}
                        {showHistory && <StudentHistoryModal users={allUsers} comps={comps} onClose={()=>setShowHistory(false)} />}
                        {showSettlement && <SettlementModal users={allUsers} comps={comps} onClose={()=>setShowSettlement(false)} />}
                        {showResetPwd && <ResetPwdModal users={allUsers} onClose={()=>setShowResetPwd(false)} onSubmit={resetStudentPwd} />}
                        {showCharts && <CompanyChartsModal company={showCharts} scope="all" onClose={()=>setShowCharts(null)} />}
                        {showTeacherCharts && <TeacherChartsPicker comps={comps} onClose={()=>setShowTeacherCharts(false)} onPick={(c)=>{ setShowTeacherCharts(false); setShowCharts(c); }} />}
                        {fineModal && <AmountInputModal title={`對 ${fineModal.compName} 罰款`} color="red" defaultVal={1000000} onClose={()=>setFineModal(null)} onSubmit={async (v)=>{ await adjustCompanyCapital(fineModal.compId, -Math.abs(v), `罰款 $${Math.abs(v).toLocaleString()}`); setFineModal(null); }} />}
                        {bonusModal && <AmountInputModal title={`發獎金給 ${bonusModal.compName}`} color="green" defaultVal={100000} onClose={()=>setBonusModal(null)} onSubmit={async (v)=>{ await adjustCompanyCapital(bonusModal.compId, Math.abs(v), `發獎金 $${Math.abs(v).toLocaleString()}`); setBonusModal(null); }} />}
                        {taxModal && <TaxSettleModal mode={taxModal} comps={comps} onClose={()=>setTaxModal(null)} onConfirm={taxModal === 'vat' ? settleAllVat : settleAllIncomeTax} />}
                        {showResetTaxConfirm && <ConfirmModal title="重置稅務結算" message="將所有公司的「已結營業稅基」歸 0、「期末營所稅旗標」解除。\n下次月結會把全部累計銷售再扣一次稅，請確認時機！" onConfirm={resetAllTaxSettlement} onCancel={()=>setShowResetTaxConfirm(false)} />}
                        {orphanQueue.length > 0 && <OrphanageModal studentName={orphanQueue[0].name} children={orphanQueue[0].children} onClose={()=>setOrphanQueue(q=>q.slice(1))} />}
                        {msg && <div className="notification-toast">{msg}</div>}
                    </div>
                );
            }
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
